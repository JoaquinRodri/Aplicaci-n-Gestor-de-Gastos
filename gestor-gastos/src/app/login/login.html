<div class="contenedor-login">

  <h2>
    @if (modoRegistro) {
      Registro
    } @else {
      Iniciar sesión
    }
  </h2>

  <!-- Input nombre -->
  <input
    type="text"
    placeholder="Nombre de usuario"
    [(ngModel)]="nombre"
  />

  <!-- Input contraseña -->
  <input
    type="password"
    placeholder="Contraseña"
    [(ngModel)]="password"
  />

  <!-- Mensaje de error -->
  @if (mensajeError) {
    <p class="error">{{ mensajeError }}</p>
  }

  <!-- Botón principal -->
  @if (modoRegistro) {
    <button (click)="registro()">Crear cuenta</button>
  } @else {
    <button (click)="login()">Entrar</button>
  }

  <!-- Enlaces para cambiar de modo -->
  @if (modoRegistro) {
    <p class="alternar" (click)="irALogin()">¿Ya tienes cuenta? Inicia sesión</p>
  } @else {
    <p class="alternar" (click)="irARegistro()">¿No tienes cuenta? Regístrate</p>
  }

</div>
<p>login works!</p>
